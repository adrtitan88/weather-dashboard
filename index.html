<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="weather-card">
    <div class="top">
      <div>
        <div class="city">Fredericksburg</div>
        <div class="condition" id="condition">Loading...</div>
      </div>
      <div class="temp" id="temp">--°</div>
    </div>

    <div class="stats">
      <div><span>Rain</span><b id="rain">--%</b></div>
      <div><span>Humidity</span><b id="humidity">--%</b></div>
      <div><span>Wind</span><b id="wind">-- mph</b></div>
    </div>

    <div class="forecast">
      <div><span>Now</span><b id="nowTemp">--°</b></div>
      <div><span>Rain</span><b id="rain2">--%</b></div>
      <div><span>Feel</span><b id="feels">--°</b></div>
      <div><span>Gust</span><b id="gust">--</b></div>
    </div>
  </div>

<script src="weather.js"></script>
</body>
</html>
